<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ephemeral chat</title>
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="landing" class="landing">
      <div class="landing__card">
        <div class="landing__brand">
          <span class="landing__logo" aria-hidden="true">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z" />
            </svg>
          </span>
          <h1 class="landing__title">Ephemeral chat</h1>
        </div>
        <p class="landing__sub">
          Session invite · groups via host · private DMs peer-to-peer
        </p>
        <form id="landing-form" class="landing__form">
          <label class="field">
            <span>Display name</span>
            <input id="landing-name" name="displayName" required maxlength="32" placeholder="Your name" autocomplete="nickname" />
          </label>
          <label class="field" id="landing-room-field">
            <span>Permanent room ID (optional)</span>
            <input id="landing-room" name="roomId" maxlength="64" placeholder="friends-room" autocomplete="off" />
          </label>
          <label class="field" id="landing-title-field">
            <span>Session title</span>
            <input id="landing-title" name="title" maxlength="48" placeholder="Weekend plans" autocomplete="off" />
          </label>
          <p id="landing-join-hint" class="landing__hint" hidden></p>
          <button type="submit" class="btn btn--primary" id="landing-submit">Create session</button>
        </form>
      </div>
    </div>

    <div id="app" class="app" hidden>
      <aside class="sidebar">
        <div class="sidebar__top">
          <button type="button" class="icon-btn sidebar__menu-btn" id="menu-toggle" aria-label="Menu" title="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          </button>
          <div class="sidebar__titlewrap">
            <span class="sidebar__badge" id="mode-badge">Online</span>
            <button type="button" class="sidebar__title" id="session-label" title="Session">Session</button>
          </div>
          <button type="button" class="icon-btn sidebar__collapse-btn" id="collapse-toggle" aria-label="Collapse sidebar" title="Collapse sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 6l-6 6 6 6" />
            </svg>
          </button>
        </div>

        <div class="sidebar__menu" id="sidebar-menu" hidden>
          <button type="button" class="menu-item" id="btn-new-dm">New DM</button>
          <button type="button" class="menu-item" id="btn-new-group">New group</button>
          <button type="button" class="menu-item" id="btn-rename">Rename session</button>
          <button type="button" class="menu-item" id="btn-admin" hidden>Kick member</button>
          <div class="sidebar__invite" id="invite-box" hidden>
            <label class="field field--compact">
              <span>Invite link</span>
              <div class="invite-row">
                <input id="invite-url" readonly />
                <button type="button" class="btn btn--small" id="invite-copy">Copy</button>
              </div>
            </label>
          </div>
          <button type="button" class="menu-item menu-item--danger" id="btn-end-session" hidden>End session</button>
        </div>

        <div class="sidebar__search">
          <svg class="sidebar__search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          <input type="search" id="chat-search" placeholder="Search" autocomplete="off" />
        </div>

        <div class="sidebar__status" id="conn-status">Connecting…</div>
        <p class="sidebar__hint" id="roster-hint" hidden>Waiting for people to join…</p>
        <ul class="chat-list" id="chat-list"></ul>
        <div class="sidebar__resize" id="sidebar-resize" aria-hidden="true"></div>
      </aside>

      <section class="main">
        <header class="chat-header" id="chat-header"></header>
        <div class="messages-wrap">
          <div class="messages" id="messages"></div>
          <button type="button" class="jump-fab" id="jump-fab" hidden aria-label="Jump to bottom">↓</button>
        </div>
        <div class="compose-wrap">
          <div class="reply-bar" id="reply-bar" hidden>
            <div class="reply-bar__body">
              <div class="reply-bar__name" id="reply-bar-name"></div>
              <div class="reply-bar__text" id="reply-bar-text"></div>
            </div>
            <button type="button" class="btn btn--danger" id="reply-bar-clear" aria-label="Cancel reply">×</button>
          </div>
          <div class="edit-bar" id="edit-bar" hidden>
            <span>Editing message</span>
            <button type="button" class="btn btn--danger" id="edit-bar-clear">Cancel</button>
          </div>
          <div class="picker" id="picker" hidden></div>
          <div class="attach-pending" id="attach-pending" hidden></div>
          <p class="upload-status" id="upload-status" hidden></p>
          <form class="compose" id="compose-form">
            <button type="button" class="compose__attach" id="attach-btn" aria-label="Attach photos, video, audio, or file" title="Attach photos, video, audio, or file">+</button>
            <input type="file" id="attach-input" multiple hidden />
            <textarea
              class="compose__input"
              id="compose-input"
              rows="1"
              placeholder="Write a message..."
              autocomplete="off"
            ></textarea>
            <button type="button" class="compose__emoji" id="picker-toggle" aria-label="Emoji and stickers" title="Emoji & stickers">☺</button>
            <button class="compose__send" id="compose-send" type="submit" aria-label="Send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87.99l.01 4.61c0 .71.73 1.2 1.39.91z" />
              </svg>
            </button>
          </form>
        </div>
      </section>
    </div>

    <div class="lightbox" id="lightbox" hidden>
      <button type="button" class="lightbox__close" id="lightbox-close" aria-label="Close">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button type="button" class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Previous image">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
      <img id="lightbox-img" alt="" />
      <button type="button" class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Next image">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <div class="lightbox__counter" id="lightbox-counter"></div>
    </div>

    <div id="modal" class="modal" hidden>
      <div class="modal__panel">
        <h2 class="modal__title" id="modal-title">New chat</h2>
        <div id="modal-body"></div>
        <div class="modal__actions">
          <button type="button" class="btn" id="modal-cancel">Cancel</button>
          <button type="button" class="btn btn--primary" id="modal-ok">Create</button>
        </div>
      </div>
    </div>

    <div id="boot-banner" class="boot-banner" hidden></div>

    <script type="module" src="./js/ui/app.js"></script>
  </body>
</html>
